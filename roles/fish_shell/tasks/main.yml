---
- name: Установить Fish shell
  ansible.builtin.apt:
    name: fish
    state: present
  become: yes

- name: Получить путь к Fish shell
  ansible.builtin.command: which fish
  register: fish_path
  changed_when: false

- name: Проверить, что Fish в списке разрешенных оболочек
  ansible.builtin.lineinfile:
    path: /etc/shells
    line: "{{ fish_path.stdout }}"
    state: present
  become: yes

- name: Получить домашнюю директорию текущего пользователя
  ansible.builtin.shell: "getent passwd {{ ansible_user }} | cut -d: -f6"
  register: user_home
  changed_when: false

- name: Создать директорию конфигурации Fish для текущего пользователя
  ansible.builtin.file:
    path: "{{ user_home.stdout }}/.config/fish"
    state: directory
    mode: "0755"
  when: user_home.stdout != ""

- name: Добавить загрузку ~/.env в .bash_profile для неинтерактивных сессий
  ansible.builtin.blockinfile:
    path: "{{ user_home.stdout }}/.bash_profile"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Environment variables"
    block: |
      # Загрузить переменные окружения из ~/.env если файл существует
      if [ -f "$HOME/.env" ]; then
        set -a
        source "$HOME/.env"
        set +a
      fi
    create: yes
  when: user_home.stdout != ""

- name: Добавить загрузку ~/.env и автозапуск Fish в .bashrc
  ansible.builtin.blockinfile:
    path: "{{ user_home.stdout }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Fish shell"
    block: |
      # Загрузить переменные окружения из ~/.env если файл существует
      if [ -f "$HOME/.env" ]; then
        set -a
        source "$HOME/.env"
        set +a
      fi
      
      # Автоматически запускать Fish shell для интерактивных сессий
      if [[ $- == *i* ]] && command -v fish &> /dev/null && [[ -z "$FISH_VERSION" ]]; then
        exec fish
      fi
    create: yes
  when: user_home.stdout != ""

- name: Создать конфигурацию Fish для загрузки ~/.env
  ansible.builtin.template:
    src: config.fish.j2
    dest: "{{ user_home.stdout }}/.config/fish/config.fish"
    mode: "0644"
  when: user_home.stdout != ""

- name: Вывести информацию об установке
  ansible.builtin.debug:
    msg: "Fish shell установлен и настроен для пользователя {{ ansible_user }} через автозапуск в .bashrc. Переменные окружения из ~/.env будут загружаться автоматически."
